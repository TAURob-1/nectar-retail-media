[phases.setup]
nixPkgs = ["nodejs_20", "python311", "python311Packages.pip"]

[phases.install]
cmds = [
  "pip install --break-system-packages -r api/requirements.txt",
  "cd ui && npm install && cd .."
]

[phases.build]
cmds = [
  "cd ui && npm run build && cd .."
]

[start]
cmd = "cd api && python3 -m uvicorn main:app --host 0.0.0.0 --port $PORT"
