[phases.setup]
nixPkgs = ["nodejs_20", "python311", "python311Packages.pip"]

[phases.install]
cmds = [
  "cd ui && npm install && cd ..",
  "pip install -r api/requirements.txt"
]

[phases.build]
cmds = [
  "cd ui && npm run build && cd .."
]

[start]
cmd = "cd api && uvicorn main:app --host 0.0.0.0 --port $PORT"
